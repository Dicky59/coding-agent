name: Scheduled Code Scan

on:
  # Run every Monday at 8am UTC
  schedule:
    - cron: '0 8 * * 1'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      repos:
        description: 'Repos to scan (comma-separated, leave empty for all configured)'
        required: false
        default: ''
      force:
        description: 'Force scan even if weekly scan is disabled'
        required: false
        default: 'false'

jobs:
  scheduled-scan:
    name: AI Code Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout coding-agent
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scan-v1

      - name: Install dependencies
        run: |
          pip install \
            anthropic \
            httpx \
            pydantic \
            python-dotenv \
            supabase \
            langchain-anthropic \
            langchain-mcp-adapters \
            mcp

      - name: Run scheduled scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_SCAN: ${{ github.event.inputs.force || 'false' }}
          OVERRIDE_REPOS: ${{ github.event.inputs.repos || '' }}
          SCAN_MODE: scheduled
        run: |
          python agent/scheduled_scanner.py
